name: muslim_day
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  adhan: ^2.0.0-nullsafety.2
  hijri: ^3.0.0
  flutter_compass: ^0.8.0
  permission_handler: ^12.0.1
  geocoding: ^4.0.0
  geolocator: ^12.0.0
  quran: ^1.2.4
  google_fonts: ^6.2.1
  http: ^1.2.1
  flutter_markdown: ^0.7.1
  # New dependencies for enhancements
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  just_audio: ^0.9.40
  google_maps_flutter: 2.5.0
  flutter_animate: ^4.5.0
  carousel_slider: ^5.0.0
  percent_indicator: ^4.2.3
  # for pdf generation and open the file 
  pdf: ^3.10.8
  path_provider: ^2.1.2
  open_filex: ^4.3.4
  #AI assistant
  google_generative_ai: ^0.4.0
  flutter_alarm_clock: ^0.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#093930"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
  - assets/fonts/NotoSansBengali-Regular.ttf
  - assets/logo.png
  - assets/fonts/
  - assets/dua_icon.png

  fonts:
    - family: IndoPak
      fonts:
        - asset: assets/fonts/indopak.ttf
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700